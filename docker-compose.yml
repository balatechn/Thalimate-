version: "3.9"

# Local development stack for ThaliMate.
# Production deploys via Coolify use a similar but tuned stack (see /coolify).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: thalimate
      POSTGRES_PASSWORD: thalimate
      POSTGRES_DB: thalimate
    ports: ["5434:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thalimate"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes: [redisdata:/data]

  evolution:
    image: atendai/evolution-api:latest
    restart: unless-stopped
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-replace-me}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgres://thalimate:thalimate@postgres:5432/evolution
      REDIS_URI: redis://redis:6379
      WEBHOOK_GLOBAL_URL: ${APP_URL:-http://host.docker.internal:3000}/api/webhooks/whatsapp
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
    depends_on: [postgres, redis]
    ports: ["8080:8080"]

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: Asia/Kolkata
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: thalimate
      DB_POSTGRESDB_PASSWORD: thalimate
    depends_on: [postgres]
    ports: ["5678:5678"]
    volumes: [n8ndata:/home/node/.n8n]

volumes:
  pgdata:
  redisdata:
  n8ndata:
